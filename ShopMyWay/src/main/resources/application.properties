spring.application.name=ShopMyWay

#spring.datasource.url=jdbc:postgresql://localhost:5432/product2_db
spring.datasource.url=jdbc:postgresql://localhost:5432/ShopMyWay_db
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.username=postgres
spring.datasource.password=Ntso@ne7
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.format_sql=true

# spring security
spring.security.user.name=user
spring.security.user.password=user123

# spring images

# Max size for a single uploaded file (e.g. 10MB)
# Without this, Spring rejects files larger than 1MB by default
spring.servlet.multipart.max-file-size=10MB

# Max size for the whole request (must be >= max-file-size)
spring.servlet.multipart.max-request-size=10MB

# Enable multipart uploads (should be true by default, but set it explicitly)
spring.servlet.multipart.enabled=true

# Thymeleaf settings (if not already in your file)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# set to true in production
spring.thymeleaf.cache=false